<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Index</title>
	<style>
		body {
			margin: 0; 
			padding: 0; 
			font-family: Arial;
		}

		.main-container {
			display: flex; 
			flex-direction: column; 
			height: 100vh;
		}

		.top-bar {
			flex-shrink: 0; 
			padding: 1.2rem 1rem; 
			border-bottom: 1px solid black;
		}

		.main-layout {
			display: flex; 
			flex: 1; 
			width: 100vw;
		}

		.main-content {
			flex: 1; 
			overflow-y: auto; 
			padding: 1rem; 
			display: flex; 
			justify-content: center; 
			align-items: center; 
			box-sizing: border-box;
		}

		.sidebar {
			flex: 0 0 320px; 
			overflow-y: auto; 
			padding: 1rem; 
			border-right: 1px solid black;
		}

		.waiting-screen {
			display: none;
		}
		.active {
			display: block;
		}
	</style>
</head>
<body>
	<div class="main-container">
		<div class="top-bar">
			<form name="user-form" style="display: inline;">
				<label for="username">Username</label>
				<input id="username" name="username" placeholder="Username" />
				<label for="roomname">Roomname</label>
				<input id="roomname" name="roomname" placeholder="Roomname" />
				<button type="submit">Join room</button>
			</form>
			 | 
			<button id="btn-leave">Leave room</button>
			 | 
			<span>Points: <span id="points">0</span></span>
		</div>

		<div id="main" class="main-layout">
			<div id="chat" class="sidebar">
				<form name="msg-form" style="display: flex; gap: 8px; width: 100%;">
				 	<input id="msg" name="msg" placeholder="Message" style="flex: 1" />
					<button type="submit" style="flex-shrink: 0;">Send</button>
				</form>
				<ul id="messages"></ul>
			</div>

			<div id="stage" class="main-content">
				<div class="waiting-screen active">
					<p style="text-align: center;">Enter your username, join a random or specific room, and wait for other members. <br />
					You can share the room name to invite other members.</p>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.socket.io/4.8.2/socket.io.min.js"></script>
	<script>
		(() => {
			const socket = io(); 

			socket.on('message', data => {
				const li = document.createElement('li');
				li.textContent = data.msg;
				document.getElementById('messages').append(li);
			});

			socket.on('room_state', data => {
				if (data.state === 'open') {
					document.querySelector('#stage').innerHTML = `
						<div class="waiting-screen active">
							<p style="text-align: center;">Enter your username, 
							join a random or specific room, and wait for other members. <br />
							You can share the room name to invite other members.</p>
						</div>
					`;
				} else if (data.state === 'closed') {
					const elem = document.querySelector('.waiting-screen');
					elem && elem.classList.remove('active');
				}
				document.querySelector('form[name="user-form"]').roomname.value = data.code;
			});


			socket.on('task', data => {
				const html = `
				<form name="task">
					<input type="number" name="a" value="${data.task.a}" readonly /> * 
					<input type="number" name="b" value="${data.task.b}" readonly /> = 
					<input type="number" name="result" value="" />
					<button type="submit" style="display: none;">Send</button>
				</form>
				`;

				document.querySelector('#stage').innerHTML = html;
				form = document.querySelector('form[name="task"]');
				form.addEventListener('submit', event => {
						event.preventDefault();
						const formData = new FormData(event.target);
						const result = formData.get('result');
						socket.emit('solve', { c: result })
					})
				form.result.focus();
			});

			socket.on('user', data => {
				document.querySelector('#points').innerText = data.points;
			});


			document.querySelector('form[name="user-form"]')
				.addEventListener('submit', event => {
					event.preventDefault();
					const formData = new FormData(event.target);
					const username = formData.get('username');
					const roomname = formData.get('roomname');
					socket.emit('join', {username, roomname});
				});

			document.getElementById('btn-leave')
				.addEventListener('click', () => socket.emit('leave', {}));

			document.querySelector('form[name="msg-form"]')
				.addEventListener('submit', event => {
					event.preventDefault();
					const formData = new FormData(event.target);
					const message = formData.get('msg');
					socket.emit('send_message', {message});
					event.target.reset();
				}); 

		})();
	</script>
</body>
</html>
